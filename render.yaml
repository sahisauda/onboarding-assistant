services:
  - type: web
    name: ranosys-ai-assistant
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/users.json
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: PORTAL_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
